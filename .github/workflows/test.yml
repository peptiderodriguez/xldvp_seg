name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install linters
        run: |
          pip install "ruff==0.15.7" "black==25.12.0"
          ruff --version
          black --version
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # Install scverse ecosystem first (avoids pip resolution-too-deep)
          pip install "spatialdata>=0.1,<1.0" "anndata>=0.10,<1.0" "scanpy>=1.9,<2.0" "squidpy>=1.3,<2.0"
          pip install -e ".[dev]" --no-deps
          # Re-install to pick up any missing transitive deps
          pip install -e ".[dev]" 2>/dev/null || true
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short -m "not integration" \
            --cov=xldvp_seg --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: .
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
