name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "ruff>=0.4,<1.0" "black>=24.0,<26.0"
      - name: Ruff check
        run: >
          ruff check
          segmentation/ tests/ scripts/
          run_segmentation.py run_lmd_export.py train_classifier.py serve_html.py
      - name: Black check
        run: >
          black --check
          segmentation/ tests/ scripts/
          run_segmentation.py run_lmd_export.py train_classifier.py serve_html.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=segmentation --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: .
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
