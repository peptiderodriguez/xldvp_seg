name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "xldvp_seg/**"
      - "README.md"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          pip install mkdocs mkdocs-material "mkdocstrings[python]"
          pip install numpy pandas scipy scikit-learn scikit-image h5py \
            matplotlib anndata shapely geopandas joblib tqdm pillow psutil \
            opencv-python-headless aicspylibczi hdf5plugin cellpose networkx
          pip install -e . --no-deps

      - name: Build and deploy
        run: mkdocs gh-deploy --force
