name: vessel_cd31_sma
czi_path: /fs/pool/pool-mann-axioscan/01_Users/EdRo_axioscan/xDVP/20251106_Fig2_nuc488_CD31_555_SMA647_PM750-EDFvar-stitch.czi
output_dir: /fs/pool/pool-mann-edwin/vessel_cell_output/

# CZI channels verified from metadata (sorted by emission wavelength):
#   C=0: Alexa Fluor 488 em=517 → nuc488
#   C=1: Alexa Fluor 555 em=568 → CD31_555
#   C=2: Alexa Fluor 647 em=668 → SMA647
#   C=3: Alexa Fluor 750 em=779 → PM750
channels: {0: nuc488, 1: CD31_555, 2: SMA647, 3: PM750}
cell_type: cell
cellpose_input_channels: [3, 0]   # cyto=PM750 (plasma membrane), nuc=nuc488
pixel_size_um: 0.1725            # from CZI metadata (Axioscan 20x)
min_area_um: 45                   # LMD-practical cell range
max_area_um: 1000
photobleach_correction: false
all_channels: true
num_gpus: 4

markers:
  - {channel: 2, name: SMA, method: otsu_half}
  - {channel: 1, name: CD31, method: otsu_half}

spatial_network:
  enabled: true
  marker_filter: "SMA_class==positive"   # from Otsu/2 classification
  max_edge_distance: 50
  min_component_cells: 5

spatial_viewer:
  enabled: true
  group_field: marker_profile    # combined SMA/CD31 classification
  title: "Vessel CD31+SMA Spatial Overview"

slurm:
  partition: p.hpcl93
  cpus: 128
  mem_gb: 700
  gpus: "l40s:4"
  time: "3-00:00:00"
