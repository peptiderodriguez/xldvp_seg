name: vessel_cd31_sma
czi_path: /fs/pool/pool-mann-axioscan/01_Users/EdRo_axioscan/xDVP/20251106_Fig2_nuc488_CD31_555_SMA647_PM750-EDFvar-stitch.czi
output_dir: /fs/pool/pool-mann-edwin/vessel_cell_output/

# CZI channels verified via czi_info.py (authoritative — NOT wavelength-sorted):
#   [0] AF488 Ex493 Em517 → nuc488
#   [1] AF647 Ex653 Em668 → SMA647
#   [2] AF750 Ex752 Em779 → PM750
#   [3] AF555 Ex553 Em568 → CD31_555
channels: {0: nuc488, 1: SMA647, 2: PM750, 3: CD31_555}
cell_type: cell
cellpose_input_channels: [2, 0]   # cyto=PM750(C=2), nuc=nuc488(C=0)
pixel_size_um: 0.1725            # from CZI metadata (Axioscan 20x)
min_area_um: 45
max_area_um: 1000
photobleach_correction: false
all_channels: true
num_gpus: 4

markers:
  - {channel: 1, name: SMA, method: otsu_half}   # SMA647 = C=1 (AF647)
  - {channel: 3, name: CD31, method: otsu_half}   # CD31_555 = C=3 (AF555)

spatial_network:
  enabled: true
  marker_filter: "SMA_class==positive"
  max_edge_distance: 50
  min_component_cells: 5

spatial_viewer:
  enabled: true
  group_field: marker_profile
  title: "Vessel CD31+SMA Spatial Overview"

slurm:
  partition: p.hpcl93
  cpus: 128
  mem_gb: 700
  gpus: "l40s:4"
  time: "3-00:00:00"
