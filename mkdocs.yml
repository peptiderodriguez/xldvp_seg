site_name: xldvp_seg
site_description: Spatial cell segmentation and Deep Visual Proteomics pipeline
site_url: https://peptiderodriguez.github.io/xldvp_seg
repo_url: https://github.com/peptiderodriguez/xldvp_seg
repo_name: peptiderodriguez/xldvp_seg

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            docstring_style: google
            members_order: source

nav:
  - Home: index.md
  - Getting Started: GETTING_STARTED.md
  - "Tutorial: Cell Detection & Markers": tutorial.md
  - LMD Export: LMD_EXPORT_GUIDE.md
  - Reference:
      - CLI Reference: cli-reference.md
      - Coordinate System: COORDINATE_SYSTEM.md
      - Output Formats: output-formats.md
  - API Reference:
      - Analysis Tools (tl): api/tl.md
      - SlideAnalysis: api/slide_analysis.md
      - Marker Classification: api/marker_classification.md
      - Clustering: api/cluster_features.md
      - Region Clustering (per-region): api/region_clustering.md
      - Spatial Networks: api/spatial_network.md
      - "I/O": api/io.md
      - Training: api/training.md
      - Omic Linker: api/omic_linker.md
      - Visualization: api/visualization.md
  - Guides:
      - NMJ Pipeline: NMJ_PIPELINE_GUIDE.md
      - Vessel Analysis: VESSEL_COMMUNITY_ANALYSIS.md
      - Vessel Lumen Threshold Pipeline: VESSEL_LUMEN_THRESHOLD_PIPELINE.md
      - Block-Face Registration: BLOCKFACE_REGISTRATION.md
      - Morphological Cluster Discovery: CLUSTER_DISCOVERY.md
  - Contributing: contributing.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
